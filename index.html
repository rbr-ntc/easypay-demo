<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1F1D3D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>EasyPay · Стол №12</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Тема до загрузки приложения: ?style=... имеет приоритет, иначе localStorage
      ;(function () {
        var q = new URLSearchParams(location.search).get('style')
        var t = q || localStorage.getItem('easypay-style') || 'classic'
        if (t !== 'seasons') t = 'classic'
        document.documentElement.dataset.theme = t
        if (q) localStorage.setItem('easypay-style', t)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
